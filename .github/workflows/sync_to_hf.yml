name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Go into the ML folder and remove the venv folder if it exists
          # This ensures we aren't pushing the heavy libraries
          rm -rf ml-service/venv

          # 2. Use a different tool (force-pushing a subdirectory)
          # We'll use a simple git push from within the folder
          cd ml-service
          git init
          git remote add space https://aviam25:$HF_TOKEN@huggingface.co/spaces/aviam25/careercompass-ai-ml
          git config user.email "you@example.com"
          git config user.name "CareerCompass AI Bot"
          git add .
          git commit -m "Deploying clean ml-service"
          git push --force space master:main