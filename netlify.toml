[build]
  base = "ml-service"
  # This command installs dependencies and the spaCy model
  command = "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
  publish = "public"

[functions]
  directory = "netlify/functions"
  # Ensures the spaCy model is included in the serverless function
  included_files = ["en_core_web_sm/**"]

[build.environment]
  # Force a stable Python version if not set elsewhere
  PYTHON_VERSION = "3.10.12"